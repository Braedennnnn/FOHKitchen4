      const formatIsoToActualDate = (isoStr) => {
        if (!isoStr || !isoStr.includes('-')) return isoStr || 'No Date';
        const parts = isoStr.split('-');
        if (parts.length < 3) return isoStr;
        
        const year = parseInt(parts[0], 10);
        const monthIdx = parseInt(parts[1], 10) - 1;
        const day = parseInt(parts[2], 10);

        const monthNames = [
          'January', 'February', 'March', 'April', 'May', 'June',
          'July', 'August', 'September', 'October', 'November', 'December'
        ];
        
        if (monthIdx < 0 || monthIdx > 11 || isNaN(day)) return isoStr;

        const getOrdinal = (n) => {
          const s = ['th', 'st', 'nd', 'rd'];
          const v = n % 100;
          return n + (s[(v - 20) % 10] || s[v] || s[0]);
        };

        return `${monthNames[monthIdx]} ${getOrdinal(day)}`;
      };

      const getDateForOffset = (days) => {
        const d = new Date();
        d.setDate(d.getDate() + days);
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const dayNum = String(d.getDate()).padStart(2, '0');
        const iso = `${year}-${month}-${dayNum}`;
        
        const actualDate = formatIsoToActualDate(iso);
        return { iso, actualDate };
      };

      const analyzeExpiration = (dateStr) => {
        if (!dateStr || typeof dateStr !== 'string') {
          return { statusCategory: 'unknown', daysUntilExpiration: 999 };
        }

        const parts = dateStr.split('-');
        if (parts.length < 3) {
          return { statusCategory: 'unknown', daysUntilExpiration: 999 };
        }

        const year = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10) - 1;
        const day = parseInt(parts[2], 10);

        const expDate = new Date(year, month, day);
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const diffTime = expDate.getTime() - today.getTime();
        const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays < 0) {
          return { statusCategory: 'expired', daysUntilExpiration: diffDays };
        } else if (diffDays <= 1) {
          return { statusCategory: 'urgent', daysUntilExpiration: diffDays };
        } else {
          return { statusCategory: 'fresh', daysUntilExpiration: diffDays };
        }
      };

      function getStoredConfig() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            if (!parsed.pat || !parsed.pat.includes('.')) {
              parsed.pat = DEFAULT_CONFIG.pat;
            }
            return { ...DEFAULT_CONFIG, ...parsed };
          }
        } catch (e) {
          console.warn('Could not read config from localStorage:', e);
        }
        return DEFAULT_CONFIG;
      }

      function saveConfig(config) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        } catch (e) {
          console.warn('Could not save config to localStorage:', e);
        }
      }

      function detectFieldNames(records, currentConfig) {
        const keysSet = new Set();
        records.forEach(rec => {
          if (rec.fields && typeof rec.fields === 'object') {
            Object.keys(rec.fields).forEach(k => keysSet.add(k));
          }
        });

        const availableKeys = Array.from(keysSet);
        let foodTypeField = currentConfig.foodTypeField;
        let expirationDateField = currentConfig.expirationDateField;

        const hasFoodType = availableKeys.includes(foodTypeField);
        const hasExpDate = availableKeys.includes(expirationDateField);

        if (!hasFoodType && availableKeys.length > 0) {
          const candidate = availableKeys.find(k => 
            /food|item|name|type|product/i.test(k)
          );
          if (candidate) foodTypeField = candidate;
          else foodTypeField = availableKeys[0];
        }

        if (!hasExpDate && availableKeys.length > 0) {
          const candidate = availableKeys.find(k => 
            /date|expire|bad|when|shelf/i.test(k) && k !== foodTypeField
          );
          if (candidate) expirationDateField = candidate;
          else if (availableKeys.length > 1) {
            expirationDateField = availableKeys.find(k => k !== foodTypeField) || availableKeys[0];
          }
        }

        return { foodTypeField, expirationDateField, availableKeys };
      }

      function mapRecordsToFoodItems(records, config) {
        return records.map(rec => {
          const fields = rec.fields || {};
          const foodType = String(
            fields[config.foodTypeField] ||
            fields['Food Type'] ||
            fields['Food Item'] ||
            fields['Item'] ||
            fields['Name'] ||
            fields['Item Name'] ||
            Object.entries(fields).find(([key]) => /food|name|item|type/i.test(key))?.[1] ||
            'Unnamed Item'
          );

          const rawDate = 
            fields[config.expirationDateField] ||
            fields['Expiration Date'] ||
            fields['Date Goes Bad'] ||
            fields['Expiration'] ||
            fields['Date'] ||
            Object.entries(fields).find(([key, val]) => /date|expire|bad/i.test(key) && typeof val === 'string' && val.match(/^\d{4}-\d{2}-\d{2}/))?.[1] ||
            '';

          const dateStr = String(rawDate).slice(0, 10);
          const { statusCategory, daysUntilExpiration } = analyzeExpiration(dateStr);

          const createdTime = fields['Created Time'] || fields['createdTime'] || rec.createdTime;

          return {
            id: rec.id,
            foodType,
            expirationDate: dateStr || 'No Date',
            createdTime: createdTime ? String(createdTime) : undefined,
            rawFields: fields,
            statusCategory,
            daysUntilExpiration,
          };
        });
      }

      async function airtableFetch(endpoint, options, config) {
        const baseHeaders = {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${config.pat}`,
          ...(options.headers || {}),
        };

        // Direct Client Fetch to Airtable API (since we are a purely static app)
        let targetUrl = config.url;
        if (endpoint === '/records') {
          if (options.method === 'GET') {
            targetUrl = `${config.url}?pageSize=100`;
          } else {
            targetUrl = config.url;
          }
        } else if (endpoint.startsWith('/records/')) {
          const id = endpoint.split('/')[2];
          if (options.method === 'DELETE') {
            targetUrl = `${config.url}?records[]=${id}`;
          } else {
            targetUrl = `${config.url}/${id}`;
          }
        }

        return fetch(targetUrl, {
          ...options,
          headers: baseHeaders,
        });
      }

      async function fetchFoodItems(config) {
        const res = await airtableFetch('/records', { method: 'GET' }, config);

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`Failed to fetch from Airtable (${res.status}): ${errText}`);
        }

        const data = await res.json();
        const records = data.records || [];

        const detected = detectFieldNames(records, config);
        const updatedConfig = {
          ...config,
          foodTypeField: detected.foodTypeField || config.foodTypeField,
          expirationDateField: detected.expirationDateField || config.expirationDateField,
        };

        const items = mapRecordsToFoodItems(records, updatedConfig);
        return { items, detectedFields: detected };
      }

      async function createFoodItem(foodType, expirationDate, config) {
        const fieldsPayload = {};
        fieldsPayload[config.foodTypeField || 'Food Type'] = foodType;
        fieldsPayload[config.expirationDateField || 'Expiration Date'] = expirationDate;

        const res = await airtableFetch('/records', {
          method: 'POST',
          body: JSON.stringify({
            records: [
              {
                fields: fieldsPayload,
              },
            ],
          }),
        }, config);

        if (!res.ok) {
          const errText = await res.text();
          if (errText.includes('UNKNOWN_FIELD_NAME')) {
            throw new Error(
              `Airtable field name error: Your Airtable columns might not match "${config.foodTypeField}" and "${config.expirationDateField}". Check column settings in the top right gear icon.`
            );
          }
          throw new Error(`Error adding item (${res.status}): ${errText}`);
        }

        const data = await res.json();
        const createdRecords = data.records || (data.id ? [data] : []);
        if (createdRecords.length === 0) {
          throw new Error('No record returned from Airtable');
        }

        const items = mapRecordsToFoodItems(createdRecords, config);
        return items[0];
      }

      async function deleteFoodItem(id, config) {
        const res = await airtableFetch(`/records/${id}`, { method: 'DELETE' }, config);
        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`Failed to delete record (${res.status}): ${errText}`);
        }
      }

      function isCreatedBeforeToday(createdTimeStr) {
        if (!createdTimeStr) return false;
        const createdDate = new Date(createdTimeStr);
        if (isNaN(createdDate.getTime())) return false;

        const todayMidnight = new Date();
        todayMidnight.setHours(0, 0, 0, 0);

        return createdDate.getTime() < todayMidnight.getTime();
      }

      async function cleanOldLogs(items, config) {
        const getItemCreatedTime = (item) => item.createdTime || item.rawFields?.['Created Time'] || item.rawFields?.['createdTime'];
        const itemsToDelete = items.filter(item => isCreatedBeforeToday(getItemCreatedTime(item)));
        if (itemsToDelete.length === 0) return items;

        console.log(`Auto-cleaning ${itemsToDelete.length} logs created before 12AM today...`);
        await Promise.allSettled(itemsToDelete.map(item => deleteFoodItem(item.id, config)));

        return items.filter(item => !isCreatedBeforeToday(getItemCreatedTime(item)));
      }

      const QuickAddPanel = ({ onAddItem, isSubmitting }) => {

      // ==========================================
      // COMPONENT: STOCK BOARD
      // ==========================================
      const StockBoard = ({ items, isLoading, onDeleteItem, onRefresh, lastUpdated }) => {
        const [activeFilter, setActiveFilter] = useState('all');
        const [deletingId, setDeletingId] = useState(null);

        const filteredItems = items.filter((item) => {
          if (activeFilter !== 'all' && item.statusCategory !== activeFilter) {
            return false;
          }
          return true;
        });

        const sortedItems = [...filteredItems].sort((a, b) => {
          return a.daysUntilExpiration - b.daysUntilExpiration;
        });

        const expiredCount = items.filter((i) => i.statusCategory === 'expired').length;
        const urgentCount = items.filter((i) => i.statusCategory === 'urgent').length;
        const freshCount = items.filter((i) => i.statusCategory === 'fresh').length;

        const handleDelete = async (item) => {
          setDeletingId(item.id);
          try {
            await onDeleteItem(item.id, item.foodType);
          } finally {
            setDeletingId(null);
          }
        };

        return (
          <div className="bg-white rounded-2xl shadow-xl border-2 border-slate-200 p-4 sm:p-6">
            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4 pb-4 border-b-2 border-slate-100">
              <div>
                <div className="inline-block bg-slate-900 text-amber-400 font-black text-xs uppercase px-3 py-1 rounded-full mb-2">
                  👨‍🍳 BOH View — Kitchen Expiration Watchlist
                </div>
                <h2 className="text-xl sm:text-2xl font-black text-slate-900 tracking-tight flex items-center gap-2">
                  📋 Kitchen Expiration & Inventory Board
                </h2>
                <p className="text-slate-500 text-xs font-semibold mt-0.5">

                </p>
              </div>

              <div className="flex items-center gap-2.5">
                {lastUpdated && (
                  <span className="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1.5 rounded-xl">
                    Synced: {lastUpdated.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                  </span>
                )}
                <button
                  type="button"
                  onClick={onRefresh}
                  disabled={isLoading}
                  className="flex items-center gap-1.5 px-3.5 py-1.5 bg-slate-100 hover:bg-slate-200 active:scale-95 text-slate-800 rounded-lg font-bold text-xs transition-all border border-slate-200 cursor-pointer"
                >
                  <RefreshCwIcon className={`w-3.5 h-3.5 ${isLoading ? 'animate-spin text-amber-600' : ''}`} />

            <div className="flex flex-wrap items-center justify-start gap-1.5 mb-5">

                <ClockIcon className="w-3.5 h-3.5" />

                  const presetMatch = PRESET_FOOD_ITEMS.find(
                    (p) => p.name.toLowerCase() === item.foodType.trim().toLowerCase()

                  const logo = presetMatch ? presetMatch.logo : '🍽️';

                  let badgeStyle = 'bg-gray-100 text-gray-800 border-gray-300';

                    badgeStyle = 'bg-amber-100 text-amber-900 font-bold border-amber-400';

                  } else if (item.statusCategory === 'fresh') {
                    badgeStyle = 'bg-emerald-100 text-emerald-900 font-bold border-emerald-300';
                    cardBorder = 'border-slate-200 hover:border-emerald-300';
                    badgeText = `✅ Fresh — Expires ${actualDateStr}`;

                      className={`p-4 rounded-xl border-2 transition-all flex flex-col justify-between shadow-sm bg-white ${cardBorder}`}

                        <h3 className="text-lg font-black text-slate-900 tracking-tight leading-tight mb-1.5 break-words flex items-center gap-2">

                        <div className="text-[10px] text-slate-500 font-semibold mb-3 space-y-0.5">

                      <div className="pt-2.5 border-t border-slate-100 flex items-center justify-between gap-1.5 mt-1">

                            onClick={() => handleDelete(item)}

                            className="w-full py-2 bg-red-600 hover:bg-red-700 active:scale-95 text-white rounded-lg font-black text-xs uppercase tracking-wider flex items-center justify-center gap-1 shadow transition-all cursor-pointer"

                            {isDeleting ? (
                              <div className="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin" />
                            ) : (
                              <Trash2Icon className="w-3.5 h-3.5" />
                            )}
                            <span>Discard & Clean</span>
                          </button>
                        ) : (
                          <button
                            type="button"
                            onClick={() => handleDelete(item)}
                            disabled={isDeleting}
                            className="w-full py-1.5 bg-slate-55 text-slate-600 hover:bg-red-50 hover:text-red-700 hover:border-red-300 active:scale-95 border border-slate-200 rounded-lg font-bold text-xs flex items-center justify-center gap-1 transition-all cursor-pointer"
                          >
                            {isDeleting ? (
                              <div className="w-3.5 h-3.5 border-2 border-slate-600 border-t-transparent rounded-full animate-spin" />
                            ) : (
                              <Trash2Icon className="w-3.5 h-3.5" />
                            )}
                            <span>Out of Stock</span>
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      };


      // ==========================================

      // ==========================================
      const ConfigModal = ({ isOpen, onClose, config, onSaveConfig, detectedKeys = [] }) => {
        const [url, setUrl] = useState(config.url);
        const [pat, setPat] = useState(config.pat);
        const [foodTypeField, setFoodTypeField] = useState(config.foodTypeField);

        const handleSave = (e) => {
          e.preventDefault();

            url: url.trim(),

            foodTypeField: foodTypeField.trim() || 'Food Type',
            expirationDateField: expirationDateField.trim() || 'Expiration Date',
          });
          setIsSaved(true);
          setTimeout(() => {
            setIsSaved(false);
            onClose();

        return (

              <div className="bg-slate-900 text-white p-5 sm:p-6 flex items-center justify-between shrink-0">
                <div className="flex items-center gap-3">
                  <div className="bg-amber-500 text-white p-2 rounded-xl">
                    <SettingsIcon className="w-5 h-5" />
                  </div>
                  <div>
                    <h3 className="text-lg sm:text-xl font-black tracking-tight">⚙️ Airtable Connection Setup</h3>
                    <p className="text-slate-400 text-xs">Configure URL, Personal Access Token, and Column Keys</p>
                  </div>

                <button
                  onClick={onClose}

              <form onSubmit={handleSave} className="p-5 sm:p-6 overflow-y-auto space-y-4">

                  <ShieldIcon className="w-4 h-4 text-amber-600 shrink-0 mt-0.5" />
                  <div>
                    <p className="font-bold mb-0.5">Pre-configured with provided credentials</p>

                <div>

                    className="w-full bg-slate-50 border-2 border-slate-300 focus:border-slate-800 rounded-xl px-3 py-2 text-xs font-mono text-slate-800 outline-none"
                  />
                </div>

                <div>
                  <label className="block text-[10px] font-bold uppercase tracking-wider text-slate-600 mb-1">
                    Personal Access Token (PAT)
                  </label>
                  <input
                    type="text"
                    value={pat}
                    onChange={(e) => setPat(e.target.value)}

                    className="w-full bg-slate-50 border-2 border-slate-300 focus:border-slate-800 rounded-xl px-3 py-2 text-xs font-mono text-slate-800 outline-none break-all"

                <div className="border-t border-slate-200 pt-4">
                  <h4 className="text-xs font-black uppercase tracking-wider text-slate-800 mb-0.5 flex items-center gap-1.5">

      // ==========================================
      // COMPONENT: MAIN APP ORCHESTRATOR
      // ==========================================
      function App() {
        const [config, setConfig] = useState(getStoredConfig());
        const [items, setItems] = useState([]);
        const [isLoading, setIsLoading] = useState(true);
        const [isSubmitting, setIsSubmitting] = useState(false);
        const [lastUpdated, setLastUpdated] = useState(null);
        const [errorMessage, setErrorMessage] = useState(null);
        const [isConfigModalOpen, setIsConfigModalOpen] = useState(false);
        const [detectedKeys, setDetectedKeys] = useState([]);
        const [autoRefreshEnabled, setAutoRefreshEnabled] = useState(false);
        const [activeView, setActiveView] = useState('foh');
        const hasRunStartupCleanupRef = useRef(false);

        const loadData = useCallback(async (silent = false) => {
          if (!silent) setIsLoading(true);
          setErrorMessage(null);

          try {
            const result = await fetchFoodItems(config);
            let finalItems = result.items;

            if (!hasRunStartupCleanupRef.current) {
              hasRunStartupCleanupRef.current = true;
              finalItems = await cleanOldLogs(finalItems, config);
            }

            setItems(finalItems);
            setLastUpdated(new Date());
            if (result.detectedFields && result.detectedFields.availableKeys) {
              setDetectedKeys(result.detectedFields.availableKeys);
            }
          } catch (err) {
            console.error('Error fetching Airtable data:', err);
            setErrorMessage(err.message || 'Could not connect to Airtable. Check your internet or API settings.');
          } finally {
            if (!silent) setIsLoading(false);
          }
        }, [config]);

        useEffect(() => {
          loadData();
        }, [loadData]);

        useEffect(() => {
          if (!autoRefreshEnabled) return;
          const interval = setInterval(() => {
            loadData(true);
          }, 25000);
          return () => clearInterval(interval);
        }, [autoRefreshEnabled, loadData]);

        const handleAddItem = async (foodType, expirationDate) => {
          setIsSubmitting(true);
          setErrorMessage(null);
          try {
            const newItem = await createFoodItem(foodType, expirationDate, config);
            setItems((prev) => [newItem, ...prev]);
            setTimeout(() => loadData(true), 1500);
          } catch (err) {
            console.error('Add item error:', err);
            setErrorMessage(err.message || 'Failed to log food item.');
            throw err;
          } finally {
            setIsSubmitting(false);
          }
        };

        const handleDeleteItem = async (id, name) => {
          const previousItems = [...items];
          setItems((prev) => prev.filter((i) => i.id !== id));

          try {
            await deleteFoodItem(id, config);
          } catch (err) {
            console.error('Delete item error:', err);
            setErrorMessage(`Failed to remove "${name}" from Airtable: ${err.message}`);
            setItems(previousItems);
          }
        };

        const handleSaveConfig = (newConfig) => {
          setConfig(newConfig);
          saveConfig(newConfig);
        };

        return (
          <div className="min-h-screen bg-slate-100 text-slate-800 font-sans pb-16 selection:bg-amber-500 selection:text-white">
            <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-4 sm:mt-6">
              
              {/* ERROR BANNER */}
              {errorMessage && (
                <div className="bg-red-600 text-white rounded-2xl p-4 sm:p-5 mb-6 shadow-lg flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                  <div className="flex items-start gap-3">
                    <AlertCircleIcon className="w-5 h-5 shrink-0 mt-0.5 text-red-200" />
                    <div>
                      <h3 className="font-black text-base">Airtable Communication Error</h3>
                      <p className="text-red-100 text-xs font-semibold mt-0.5">{errorMessage}</p>
                    </div>
                  </div>
                  <div className="flex gap-2 shrink-0">
                    <button
                      type="button"
                      onClick={() => loadData()}
                      className="bg-white text-red-700 hover:bg-red-50 font-black px-3 py-1.5 rounded-xl text-[10px] uppercase tracking-wider shadow transition-all cursor-pointer"
                    >
                      Retry Fetch
                    </button>
                    <button
                      type="button"
                      onClick={() => setIsConfigModalOpen(true)}
                      className="bg-red-800 hover:bg-red-900 text-white font-black px-3 py-1.5 rounded-xl text-[10px] uppercase tracking-wider transition-all cursor-pointer border border-red-700"
                    >
                      Inspect Setup
                    </button>
                  </div>
                </div>
              )}

              {/* CONSOLIDATED HEADER & VIEW TOGGLER */}
              <div className="bg-white rounded-2xl shadow-md border-2 border-slate-200 p-3 sm:p-4 mb-6 flex flex-col md:flex-row items-center justify-between gap-4">
                <div className="flex items-center gap-2.5 mr-auto md:mr-0">
                  <span className="bg-slate-900 text-amber-400 p-2 rounded-xl text-base font-black leading-none select-none">🏢</span>
                  <div>
                    <span className="font-black text-sm uppercase tracking-wider text-slate-900 block">
                      FOH ↔ Kitchen
                    </span>
                    <span className="text-xs font-semibold text-slate-500">
                      Front of House entry & Kitchen watchlist
                    </span>
                  </div>
                </div>
                
                <div className="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                  <div className="grid grid-cols-3 gap-1 bg-slate-100 p-1 rounded-xl w-full sm:w-auto">
                    <button
                      type="button"
                      onClick={() => setActiveView('foh')}
                      className={`px-3 py-2 rounded-lg font-black text-xs transition-all flex items-center justify-center gap-1 cursor-pointer ${
                        activeView === 'foh'
                          ? 'bg-emerald-600 text-white shadow'
                          : 'text-slate-600 hover:bg-slate-200'
                      }`}
                    >
                      <span>🍽️ FOH</span>
                    </button>

                    <button
                      type="button"
                      onClick={() => setActiveView('boh')}
                      className={`px-3 py-2 rounded-lg font-black text-xs transition-all flex items-center justify-center gap-1 cursor-pointer ${
                        activeView === 'boh'
                          ? 'bg-slate-900 text-white shadow'
                          : 'text-slate-600 hover:bg-slate-200'
                      }`}
                    >
                      <span>👨‍🍳 BOH</span>
                    </button>

                    <button
                      type="button"
                      onClick={() => setActiveView('split')}
                      className={`px-3 py-2 rounded-lg font-black text-xs transition-all flex items-center justify-center gap-1 cursor-pointer ${
                        activeView === 'split'
                          ? 'bg-amber-600 text-white shadow'
                          : 'text-slate-600 hover:bg-slate-200'
                      }`}
                    >
                      <span>↔️ Split</span>
                    </button>
                  </div>

                  <div className="flex items-center gap-2 w-full sm:w-auto justify-end">
                    <button
                      type="button"
                      onClick={() => setAutoRefreshEnabled(!autoRefreshEnabled)}
                      title={autoRefreshEnabled ? 'Auto-sync active (every 25s)' : 'Updates on startup only (click to enable background auto-sync)'}
                      className={`flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-bold border transition-all cursor-pointer ${
                        autoRefreshEnabled
                          ? 'bg-emerald-50 text-emerald-700 border-emerald-300'
                          : 'bg-slate-150 text-slate-500 border-slate-200'
                      }`}
                    >
                      <RadioIcon className={`w-3.5 h-3.5 ${autoRefreshEnabled ? 'animate-pulse text-emerald-500' : ''}`} />
                      <span>{autoRefreshEnabled ? 'Live Sync' : 'Static Mode'}</span>
                    </button>

                    <button
                      type="button"
                      onClick={() => setIsConfigModalOpen(true)}
                      className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-900 hover:bg-slate-800 text-amber-400 rounded-lg font-bold text-xs transition-all border border-slate-800 active:scale-95 cursor-pointer"
                    >
                      <SettingsIcon className="w-3.5 h-3.5" />
                      <span>Setup</span>
                    </button>
                  </div>
                </div>
              </div>

              {/* FOH PANEL */}
              {(activeView === 'foh' || activeView === 'split') && (
                <QuickAddPanel
                  onAddItem={handleAddItem}
                  isSubmitting={isSubmitting}
                />
              )}

              {/* BOH PANEL */}
              {(activeView === 'boh' || activeView === 'split') && (
                <StockBoard
                  items={items}
                  isLoading={isLoading}
                  onDeleteItem={handleDeleteItem}
                  onRefresh={() => loadData()}
                  lastUpdated={lastUpdated}
                />
              )}
            </main>

            <ConfigModal
              isOpen={isConfigModalOpen}
              onClose={() => setIsConfigModalOpen(false)}
              config={config}
              onSaveConfig={handleSaveConfig}
              detectedKeys={detectedKeys}
            />
          </div>
        );
      }

      // Render App Root
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
